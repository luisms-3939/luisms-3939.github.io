title: "Luis Modesto - Portfolio"
baseurl: ""
url: "https://luisms-3939.github.io"
markdown: kramdown

# IMPORTANTE: Desactiva el tema si no lo usas
# theme: minima  # COMENTA O ELIMINA ESTA LÍNEA

collections:
  projects:
    output: true
    permalink: /projects/:path/
  certifications:
    output: true
    permalink: /certifications/:path/

# Configuración adicional segura para GitHub Pages
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Opcional: Configuración por defecto
defaults:
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "certifications"
    values:
      layout: "default"
